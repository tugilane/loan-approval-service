databaseChangeLog:
  - changeSet:
      id: 002-create-payment-schedule-table
      author: marten
      changes:
        - createTable:
            tableName: payment_schedule
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: application_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: payment_number
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: payment_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: monthly_payment
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

              - column:
                  name: principal_payment
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

              - column:
                  name: interest_payment
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

              - column:
                  name: remaining_balance
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: payment_schedule
            baseColumnNames: application_id
            referencedTableName: loan_applications
            referencedColumnNames: id
            constraintName: fk_payment_schedule_application