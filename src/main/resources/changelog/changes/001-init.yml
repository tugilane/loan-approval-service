databaseChangeLog:
  - changeSet:
      id: 001-create-loan-applications
      author: marten
      changes:
        - createTable:
            tableName: loan_applications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: first_name
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: personal_code
                  type: VARCHAR(11)
                  constraints:
                    nullable: false

              - column:
                  name: loan_period_months
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: interest_margin
                  type: DECIMAL(5,3)
                  constraints:
                    nullable: false

              - column:
                  name: base_interest_rate
                  type: DECIMAL(5,3)
                  constraints:
                    nullable: false

              - column:
                  name: loan_amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: rejection_reason
                  type: VARCHAR(64)