# app
spring.application.name=loan-process-service
loan.max-age=70

# database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:appdb}
spring.datasource.username=${DB_USER:appuser}
spring.datasource.password=${DB_PASSWORD:apppass}

# liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:changelog/changelog-master.yml

# JPA
spring.jpa.hibernate.ddl-auto=validate